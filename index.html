<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INFO 358: Healthwashing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container"></div>

  <!-- Product inspection modal -->
  <div id="product-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-product-name">Product Name</h2>
        <button id="modal-close" class="modal-close-btn">&times;</button>
      </div>

      <!-- Shared images row -->
      <div class="images-row">
        <div id="image-container" class="image-container">
          <div id="front-img-wrapper" class="extra-img-wrapper">
            <div id="zoom-inner" class="extra-zoom-inner">
              <img id="modal-image" src="" alt="Product packaging" />
              <!-- hotspot divs injected by JS -->
            </div>
          </div>
        </div>
        <div id="extra-images" class="extra-images"></div>
      </div>
      <div id="modal-splitter" class="modal-splitter"></div>

      <!-- Phase 1: User selects hotspots -->
      <div id="phase-select" class="modal-body">
        <p class="modal-instructions">Tap the areas on the packaging you think are examples of healthwashing. Hold <strong>Shift</strong> and click multiple areas to group elements that work together.</p>
        <p class="zoom-hint">Double-click the image to zoom in. Double-click again to zoom out.</p>
        <div id="reasoning-area" class="reasoning-area"></div>
        <div class="modal-footer">
          <button id="btn-submit" class="btn btn-submit">Submit</button>
        </div>
      </div>

      <!-- Phase 2: Comparison reveal -->
      <div id="phase-reveal" class="modal-body hidden">
        <div class="reveal-columns">
          <div class="reveal-col">
            <div class="reveal-col-title user-title">Your Analysis</div>
            <div id="reveal-user" class="reveal-col-body"></div>
          </div>
          <div class="reveal-col">
            <div class="reveal-col-title our-title">Our Analysis</div>
            <div id="reveal-ours" class="reveal-col-body"></div>
          </div>
        </div>
        <div id="reveal-summary" class="reveal-summary"></div>
        <div class="modal-footer">
          <button id="btn-continue" class="btn btn-submit">Close</button>
        </div>
      </div>

      <!-- Fallback for items with no images -->
      <div id="phase-empty" class="modal-body hidden">
        <p class="modal-instructions">This product hasn't been set up yet.</p>
        <div class="modal-footer">
          <button id="btn-empty-close" class="btn btn-submit">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
