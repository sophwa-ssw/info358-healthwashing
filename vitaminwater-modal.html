          const rect = imageContainer.getBoundingClientRect();

          const dy = (e.clientY - state.panState.startY) / rect.height * 100;
          const orig = state.panState.origOrigin.split(' ');
          inner.style.transformOrigin = `${parseFloat(orig[0]) - dx}% ${parseFloat(orig[1]) - dy}%`;

          state.panState.startY = e.clientY;

          e.preventDefault();
          if (e.target.closest('.hotspot')) return;
          zoomed = !zoomed;
          if (zoomed) {
            const rect = wrapper.getBoundingClientRect();
            inner.style.transformOrigin = `${(e.clientX - rect.left) / rect.width * 100}% ${(e.clientY - rect.top) / rect.height * 100}%`;
            inner.style.transform = 'scale(2.5)';
            wrapper.classList.add('zoomed');
          } else {
            inner.style.transform = 'scale(1)';
            inner.style.transformOrigin = 'center center';
            wrapper.classList.remove('zoomed');
          }
        });
        wrapper.addEventListener('mousedown', (e) => {
          if (!zoomed || e.target.closest('.hotspot')) return;
          e.preventDefault();
          panState = { startX: e.clientX, startY: e.clientY, origOrigin: inner.style.transformOrigin };
        });
        const onMove = (e) => {
          if (!panState) return;
          const rect = wrapper.getBoundingClientRect();
          const dx = (e.clientX - panState.startX) / rect.width * 100;
          const dy = (e.clientY - panState.startY) / rect.height * 100;
          const orig = panState.origOrigin.split(' ');
          inner.style.transformOrigin = `${parseFloat(orig[0]) - dx}% ${parseFloat(orig[1]) - dy}%`;
          panState.startX = e.clientX;
          panState.startY = e.clientY;
          panState.origOrigin = inner.style.transformOrigin;
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', () => { panState = null; });
      }

      function buildHotspots(hotspots) {
        const zoomInner = document.getElementById('zoom-inner');
        zoomInner.querySelectorAll('.hotspot').forEach(el => el.remove());
        const oldSvg = zoomInner.querySelector('.leader-overlay');
        if (oldSvg) oldSvg.remove();
        state.zoomed = false;
        zoomInner.style.transform = 'scale(1)';
        zoomInner.style.transformOrigin = 'center center';
        imageContainer.classList.remove('zoomed');

        const NS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(NS, 'svg');
        svg.classList.add('leader-overlay');
        svg.setAttribute('viewBox', '0 0 100 100');
        svg.setAttribute('preserveAspectRatio', 'none');
        const r = 1.8, lineLen = 4, placed = [];

        hotspots.forEach((hs, index) => {
          const div = document.createElement('div');
          div.className = 'hotspot';
          div.dataset.id = hs.id;
          div.style.cssText = `left:${hs.left}%;top:${hs.top}%;width:${hs.width}%;height:${hs.height}%`;
          div.addEventListener('click', (e) => { if (!state.inReveal) { e.stopPropagation(); handleHotspotClick(hs.id, index, e); } });
          div.addEventListener('mouseenter', () => {
            if (state.inReveal) return;
            const ln = svg.querySelector(`.leader-line[data-index="${index}"]`);
            const nm = svg.querySelector(`.leader-number[data-index="${index}"]`);
            if (ln) ln.classList.add('hovered');
            if (nm) nm.classList.add('hovered');
          });
          div.addEventListener('mouseleave', () => {
            const ln = svg.querySelector(`.leader-line[data-index="${index}"]`);
            const nm = svg.querySelector(`.leader-number[data-index="${index}"]`);
            if (ln) ln.classList.remove('hovered');
            if (nm) nm.classList.remove('hovered');
          });
          zoomInner.appendChild(div);
          state.allHotspotRefs.push({ id: hs.id, el: div, container: zoomInner });

          const cx = hs.left + hs.width / 2, cy = hs.top + hs.height / 2;
          const candidates = [
            { nx: hs.left - lineLen - r, ny: cy, lx: hs.left, ly: cy },
            { nx: hs.left + hs.width + lineLen + r, ny: cy, lx: hs.left + hs.width, ly: cy },
            { nx: cx, ny: hs.top - lineLen - r, lx: cx, ly: hs.top },
            { nx: cx, ny: hs.top + hs.height + lineLen + r, lx: cx, ly: hs.top + hs.height }
          ];
          let best = null, bestScore = -Infinity;
          for (const c of candidates) {
            if (c.nx < 1 || c.nx > 99 || c.ny < 1 || c.ny > 99) continue;
            let score = 0;
            for (const other of hotspots) {
              if (c.nx > other.left - r && c.nx < other.left + other.width + r && c.ny > other.top - r && c.ny < other.top + other.height + r) score -= 10;
            }
            for (const p of placed) {
              const dist = Math.sqrt((c.nx - p.x) ** 2 + (c.ny - p.y) ** 2);
              if (dist < 4) score -= (4 - dist) * 3;
            }
            if (best === null || score > bestScore) { best = c; bestScore = score; }
          }
          if (!best) best = candidates[0];
          placed.push({ x: best.nx, y: best.ny });
          const dx = best.nx - best.lx, dy = best.ny - best.ly;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const endX = dist > 0 ? best.nx - (dx / dist) * r : best.nx;
          const endY = dist > 0 ? best.ny - (dy / dist) * r : best.ny;

          const line = document.createElementNS(NS, 'line');
          line.classList.add('leader-line');
          line.dataset.index = index;
          line.setAttribute('x1', best.lx);
          line.setAttribute('y1', best.ly);
          line.setAttribute('x2', endX);
          line.setAttribute('y2', endY);
          line.setAttribute('vector-effect', 'non-scaling-stroke');
          svg.appendChild(line);

          const g = document.createElementNS(NS, 'g');
          g.classList.add('leader-number');
          g.dataset.index = index;
          g.dataset.id = hs.id;
          const circle = document.createElementNS(NS, 'circle');
          circle.setAttribute('cx', best.nx);
          circle.setAttribute('cy', best.ny);
          circle.setAttribute('r', r);
          circle.setAttribute('vector-effect', 'non-scaling-stroke');
          g.appendChild(circle);
          const text = document.createElementNS(NS, 'text');
          text.setAttribute('x', best.nx);
          text.setAttribute('y', best.ny);
          text.textContent = index + 1;
          text.setAttribute('vector-effect', 'non-scaling-stroke');
          g.appendChild(text);
          g.addEventListener('click', (e) => { if (!state.inReveal) { e.stopPropagation(); handleHotspotClick(hs.id, index, e); } });
          svg.appendChild(g);
        });
        zoomInner.appendChild(svg);
      }

      function buildExtraImages(images, hs) {

      function handleHotspotClick(id, globalIdx, event) {
        if (event.shiftKey) {
          handleGroupClick(id, globalIdx);
        } else {
          finalizePendingGroup();
          handleIndividualClick(id, globalIdx);
        }
      }

      function handleGroupClick(id, globalIdx) {
        const pendingIdx = state.pendingGroup.indexOf(id);
        if (pendingIdx >= 0) {
          state.pendingGroup.splice(pendingIdx, 1);
          if (!state.individualSelections.has(id)) state.selectedHotspots.delete(id);
          updateHotspotVisual(id, globalIdx);
          return;
        }
        if (state.hotspotGroupMap[id]) removeFromGroup(id);
        state.pendingGroup.push(id);
        state.selectedHotspots.add(id);
        updateHotspotVisual(id, globalIdx);
      }

      function handleIndividualClick(id, globalIdx) {
        const isIndividual = state.individualSelections.has(id);
        if (isIndividual) {
          state.individualSelections.delete(id);
          removeReasoningInput(id);
          if (!state.hotspotGroupMap[id] && !state.pendingGroup.includes(id)) state.selectedHotspots.delete(id);
        } else {
          state.individualSelections.add(id);
          state.selectedHotspots.add(id);
          addReasoningInput(id, globalIdx);
        }
        updateHotspotVisual(id, globalIdx);
      }

      function finalizePendingGroup() {
        if (state.pendingGroup.length === 0) return;
        const pending = [...state.pendingGroup];
        state.pendingGroup = [];
        if (pending.length === 1) {
          const id = pending[0];
          const gi = state.allHotspotRefs.findIndex(r => r.id === id);
          if (!state.individualSelections.has(id)) {
            state.individualSelections.add(id);
            addReasoningInput(id, gi);
          }
          updateHotspotVisual(id, gi);
        } else {
          const groupKey = `group-${state.groupCounter++}`;
          const group = { ids: [...pending], key: groupKey };
          state.selectionGroups.push(group);
          for (const gid of group.ids) {
            state.hotspotGroupMap[gid] = groupKey;
            const gi = state.allHotspotRefs.findIndex(r => r.id === gid);
            updateHotspotVisual(gid, gi);
          }
          addGroupReasoningInput(group);
        }
      }

      function updateHotspotVisual(id, globalIdx) {
        const ref = state.allHotspotRefs[globalIdx];
        if (!ref) return;
        const isIndividual = state.individualSelections.has(id);
        const isGrouped = !!state.hotspotGroupMap[id];
        const isPending = state.pendingGroup.includes(id);
        ref.el.classList.remove('selected', 'grouping', 'grouped');
        if (isPending) ref.el.classList.add('grouping');
        if (isGrouped) ref.el.classList.add('grouped');
        if (isIndividual) ref.el.classList.add('selected');
        const svg = ref.container.querySelector('.leader-overlay');
        if (!svg) return;
        const line = svg.querySelector(`.leader-line[data-index="${globalIdx}"]`);
        const numG = svg.querySelector(`.leader-number[data-index="${globalIdx}"]`);
        for (const el of [line, numG]) {
          if (!el) continue;
          el.classList.remove('selected', 'grouping', 'grouped');
          if (isPending) el.classList.add('grouping');
          if (isGrouped) el.classList.add('grouped');
          if (isIndividual) el.classList.add('selected');
        }
      }

      function removeFromGroup(id) {
        const groupKey = state.hotspotGroupMap[id];
        if (!groupKey) return;
        const groupIdx = state.selectionGroups.findIndex(g => g.key === groupKey);
        if (groupIdx < 0) return;
        const group = state.selectionGroups[groupIdx];
        group.ids = group.ids.filter(gid => gid !== id);
        delete state.hotspotGroupMap[id];
        if (!state.individualSelections.has(id)) state.selectedHotspots.delete(id);
        const savedReason = state.userReasons[groupKey];
        removeReasoningInput(groupKey);
        if (group.ids.length <= 1) {
          if (group.ids.length === 1) {
            const remainId = group.ids[0];
            delete state.hotspotGroupMap[remainId];
            const ri = state.allHotspotRefs.findIndex(r => r.id === remainId);
            if (!state.individualSelections.has(remainId)) {
              state.individualSelections.add(remainId);
              state.selectedHotspots.add(remainId);
              addReasoningInput(remainId, ri);
            }
            updateHotspotVisual(remainId, ri);
          }
          state.selectionGroups.splice(groupIdx, 1);
        } else {
          state.userReasons[groupKey] = savedReason;
          addGroupReasoningInput(group);
        }
        const gi = state.allHotspotRefs.findIndex(r => r.id === id);
        updateHotspotVisual(id, gi);
      }

      function addGroupReasoningInput(group) {
        const entry = document.createElement('div');
        entry.className = 'reasoning-entry group-entry';
        entry.dataset.id = group.key;
        const nums = group.ids.map(gid => state.allHotspotRefs.findIndex(r => r.id === gid) + 1).sort((a,b)=>a-b);
        const minIdx = Math.min(...nums) - 1;
        entry.dataset.order = minIdx;
        const label = document.createElement('span');
        label.className = 'reason-label group-label';
        label.textContent = nums.join('+');
        const textarea = document.createElement('textarea');
        textarea.placeholder = 'How do these elements work together to mislead?';
        textarea.rows = 2;
        textarea.value = state.userReasons[group.key] || '';
        textarea.addEventListener('input', () => { state.userReasons[group.key] = textarea.value; });
        entry.appendChild(label);
        entry.appendChild(textarea);
        const existing = reasoningArea.querySelectorAll('.reasoning-entry');
        let inserted = false;
        for (const el of existing) {
          if (Number(el.dataset.order) > minIdx) {
            reasoningArea.insertBefore(entry, el);
            inserted = true;
            break;
          }
        }
        if (!inserted) reasoningArea.appendChild(entry);
      }

      function addReasoningInput(id, index) {
        const entry = document.createElement('div');
        entry.className = 'reasoning-entry';
        entry.dataset.id = id;
        entry.dataset.order = index;
        const label = document.createElement('span');
        label.className = 'reason-label';
        label.textContent = index + 1;
        const textarea = document.createElement('textarea');
        textarea.placeholder = 'Why do you think this is healthwashing?';
        textarea.rows = 1;
        textarea.value = state.userReasons[id] || '';
        textarea.addEventListener('input', () => { state.userReasons[id] = textarea.value; });
        entry.appendChild(label);
        entry.appendChild(textarea);
        const existing = reasoningArea.querySelectorAll('.reasoning-entry');
        let inserted = false;
        for (const el of existing) {
          if (Number(el.dataset.order) > index) {
            reasoningArea.insertBefore(entry, el);
            inserted = true;
            break;
          }
        }
        if (!inserted) reasoningArea.appendChild(entry);
      }

      function removeReasoningInput(id) {
        const entry = reasoningArea.querySelector(`.reasoning-entry[data-id="${id}"]`);
        if (entry) entry.remove();
        delete state.userReasons[id];
      }

      function submitSelections() {
        finalizePendingGroup();
        state.inReveal = true;
        imageContainer.classList.add('in-reveal');
        document.querySelectorAll('.extra-img-wrapper').forEach(w => w.classList.add('in-reveal'));
        buildRevealUser();
        buildRevealOurs();
        if (productData.summary) {
          revealSummary.innerHTML = productData.summary;
          revealSummary.style.display = '';
        } else {
          revealSummary.style.display = 'none';
        }
        phaseSelect.classList.add('hidden');
        phaseReveal.classList.remove('hidden');
        setTimeout(() => {
          const body = phaseReveal;
          const hasOverflow = body && body.scrollHeight > body.clientHeight;
          if (splitter) splitter.classList.toggle('hidden', !hasOverflow);
        }, 50);
      }

      function buildRevealUser() {
        revealUser.innerHTML = '';
        const entries = [];
        for (const id of state.individualSelections) {
          const globalIdx = state.allHotspotRefs.findIndex(r => r.id === id);
          const num = globalIdx + 1;
          const reason = state.userReasons[id] || '';
          entries.push({ nums: [num], reason, sortKey: num });
        }
        for (const group of state.selectionGroups) {
          const nums = group.ids.map(gid => state.allHotspotRefs.findIndex(r => r.id === gid) + 1).sort((a,b)=>a-b);
          entries.push({ nums, reason: state.userReasons[group.key] || '', sortKey: Math.min(...nums), isGroup: true });
        }
        entries.sort((a, b) => a.sortKey - b.sortKey);
        if (entries.length === 0) {
          revealUser.innerHTML = '<p class="reveal-empty">You didn\'t select any areas — no worries, take a look at what we found.</p>';
          return;
        }
        entries.forEach(entry => {
          const el = document.createElement('div');
          el.className = 'reveal-entry';
          el.dataset.nums = entry.nums.join(',');
          const label = document.createElement('span');
          label.className = 'reveal-entry-label' + (entry.isGroup ? ' group' : '');
          label.textContent = entry.nums.join('+');
          const text = document.createElement('div');
          text.className = 'reveal-entry-text';
          text.innerHTML = entry.reason ? `<p>${entry.reason}</p>` : '<p class="no-reason">No reasoning provided</p>';
          el.appendChild(label);
          el.appendChild(text);
          el.addEventListener('mouseenter', () => highlightRevealHotspots(entry.nums, true));
          el.addEventListener('mouseleave', () => highlightRevealHotspots(entry.nums, false));
          revealUser.appendChild(el);
        });
      }

      function buildRevealOurs() {
        revealOurs.innerHTML = '';
        const entries = [];
        const individualPicks = new Set(productData.ourPicks || []);
        const ourGroups = productData.ourGroups || [];
        for (const num of individualPicks) {
          const explanation = productData.explanations?.[num] || '';
          if (!explanation) continue;
          entries.push({ nums: [num], explanation, citation: productData.citations?.[num] || '', sortKey: num });
        }
        for (const group of ourGroups) {
          entries.push({ nums: [...group.ids].sort((a,b)=>a-b), explanation: group.explanation, citation: group.citation || '', citationMla: group.citationMla || '', sortKey: Math.min(...group.ids), isGroup: true });
        }
        entries.sort((a, b) => a.sortKey - b.sortKey);
        if (entries.length === 0) {
          revealOurs.innerHTML = '<p class="reveal-empty">No annotations for this product yet.</p>';
          return;
        }
        entries.forEach(entry => {
          const el = document.createElement('div');
          el.className = 'reveal-entry';
          el.dataset.nums = entry.nums.join(',');
          const label = document.createElement('span');
          label.className = 'reveal-entry-label' + (entry.isGroup ? ' group' : '');
          label.textContent = entry.nums.join('+');
          const text = document.createElement('div');
          text.className = 'reveal-entry-text';
          let html = `<p>${entry.explanation}</p>`;
          if (entry.citation || entry.citationMla) {
            let citationHtml = '';
            if (entry.citationMla) {
              const mlaText = entry.citation
                ? entry.citationMla.replace(entry.citation, '\x00LINK\x00')
                : entry.citationMla;
              const parts = mlaText.split('\x00LINK\x00');
              citationHtml = parts[0] + (entry.citation ? `<a href="${entry.citation}" target="_blank" rel="noopener">${entry.citation}</a>` : '') + (parts[1] || '');
            } else {
              citationHtml = `<a href="${entry.citation}" target="_blank" rel="noopener">${entry.citation}</a>`;
            }
            html += `
            <div class="reveal-citation-dropdown">
              <button class="reveal-citation-toggle" type="button">
                <span class="arrow">▸</span> Citation
              </button>
              <div class="reveal-citation-content">${citationHtml}</div>
            </div>`;
          }
          text.innerHTML = html;
          const dropdown = text.querySelector('.reveal-citation-dropdown');
          if (dropdown) {
            dropdown.querySelector('.reveal-citation-toggle').addEventListener('click', (e) => {
              e.stopPropagation();
              dropdown.classList.toggle('expanded');
            });
          }
          el.appendChild(label);
          el.appendChild(text);
          el.addEventListener('mouseenter', () => highlightRevealHotspots(entry.nums, true));
          el.addEventListener('mouseleave', () => highlightRevealHotspots(entry.nums, false));
          revealOurs.appendChild(el);
        });
      }

      function highlightRevealHotspots(nums, on) {
        nums.forEach(n => {
          const idx = n - 1;
          const ref = state.allHotspotRefs[idx];
          if (!ref) return;
          ref.el.classList.toggle('hovered', on);
          const svg = ref.container.querySelector('.leader-overlay');
          if (svg) {
            const line = svg.querySelector(`.leader-line[data-index="${idx}"]`);
            const numG = svg.querySelector(`.leader-number[data-index="${idx}"]`);
            if (line) line.classList.toggle('hovered', on);
            if (numG) numG.classList.toggle('hovered', on);
          }
        });
      }

      function closeModal() {
        modalEl.classList.add('hidden');
        const msg = document.getElementById('closed-message');
        if (msg) msg.classList.remove('hidden');
      }

      modalNameEl.textContent = productData.name;
      state.allHotspotRefs = [];
      modalImage.src = productData.images.front;
      buildHotspots(hotspotsData.front);
      buildExtraImages(productData.images, hotspotsData);
      imagesRow.style.height = '';
      setupZoom();

      modalCloseBtn.addEventListener('click', closeModal);
      btnSubmit.addEventListener('click', submitSelections);
      btnContinue.addEventListener('click', closeModal);

      window.addEventListener('keyup', (e) => {
        if (e.key === 'Shift') finalizePendingGroup();
      });

      setTimeout(() => {
        if (imagesRow) state.imagesRowNaturalHeight = imagesRow.getBoundingClientRect().height;
      }, 50);
    })();
  </script>
</body>
</html>
